# Production-oriented stack for @algoryx/apiv2.
# Run from this directory:
#   cp .env.docker.example .env
#   docker compose up -d --build
#
# Build context is the monorepo root (../../) so npm workspaces resolve correctly.
name: algoryx-apiv2
services:
  apiv2:
    build:
      context: ../..
      dockerfile: apps/apiv2/Dockerfile
    image: algoryx-apiv2:latest
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - '4001:4001'
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: '4001'
    networks:
      - apiv2
networks:
  apiv2:
    driver: bridge
